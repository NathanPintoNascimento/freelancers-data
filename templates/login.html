<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background-color: #d97706;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: white;
            margin-bottom: 24px;
            font-size: clamp(20px, 5vw, 26px);
        }
        .card {
            background: white;
            border-radius: 10px;
            padding: clamp(20px, 5vw, 30px);
            width: 100%;
            max-width: 360px;
        }
        label {
            font-size: 14px;
            color: #555;
            display: block;
            margin-bottom: 4px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 16px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 16px;
            color: #333;
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: #d97706;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover { background-color: #b45309; }
        .erro {
            background: #fee2e2;
            color: #991b1b;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
        }
        .voltar {
            color: white;
            text-decoration: none;
            margin-bottom: 20px;
            display: inline-block;
            font-size: 15px;
        }
    </style>
</head>
<body>
    <a class="voltar" href="/">← Voltar</a>
    <h1>🔐 Acesso Empresa</h1>
    <div class="card">
        {% if erro %}
        <p class="erro">{{ erro }}</p>
        {% endif %}
        <form action="/login" method="POST">
            <label>Usuário</label>
            <input type="text" name="usuario" required>
            <label>Senha</label>
            <input type="password" name="senha" required>
            <button type="submit">Entrar</button>
        </form>
    </div>
</body>
</html>
